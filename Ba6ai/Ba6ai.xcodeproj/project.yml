---
name: Ba6ai
options:
  minimumXcodeGenVersion: 2.30.0
  deploymentTarget:
    iOS: 16.0
  createIntermediateGroups: true
  groupSortPosition: top
  useBaseInternationalization: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    CODE_SIGN_STYLE: Automatic
    # Replace with your 10-character Team ID (e.g., ABCDE12345) or set in Xcode Cloud as env var DEVELOPMENT_TEAM
    # DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    DEVELOPMENT_TEAM: "Archie Crawford"
    PRODUCT_BUNDLE_IDENTIFIER: ac.ba6.Ba6Ai
    ENABLE_USER_SCRIPT_SANDBOXING: YES

attributes:
  ORGANIZATIONNAME: "Ba6Ai"

packages: {}

targets:
  Ba6ai:
    type: application
    platform: iOS
    deploymentTarget: 16.0
    sources:
      - path: Ba6ai
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: Ba6ai
        PRODUCT_BUNDLE_IDENTIFIER: ac.ba6.Ba6Ai
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets: []
      gatherCoverageData: false
      parallelizeBuild: true
      buildImplicitDependencies: true
    postCompileScripts:
      - name: "Xcode Cloud: Cache Pods/Derived Data placeholder"
        script: |
          echo "Post-compile hook"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: "Xcode Cloud: Build Summary"
        script: |
          echo "Build completed at $(date)"
        basedOnDependencyAnalysis: false

schemes:
  Ba6ai:
    shared: true
    build:
      targets:
        Ba6Ai: all
    run:
      config: Debug
    archive:
      config: Release
  Ba6Ai:
    shared: true
    build:
      targets:
        Ba6Ai: all
    run:
      config: Debug
    archive:
      config: Release

generate:
  # Keeps the generated .xcodeproj at repo root
  projectRoot: .
