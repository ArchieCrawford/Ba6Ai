name: Ba6Ai
options:
  bundleIdPrefix: ai.ba6
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES

packages:
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.21.0"
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.21.0"

targets:
  Ba6Ai:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BA6 AI
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: BA6 AI uses the camera to understand images you share with it, on-device.
        NSPhotoLibraryUsageDescription: BA6 AI reads images you pick so it can describe or reason about them.
        NSFaceIDUsageDescription: BA6 AI uses Face ID to unlock your private memory and identity key.
        NSUserActivityTypes:
          - AskBA6Intent
          - RememberFactIntent
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Resources/Ba6Ai.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.ba6.Ba6Ai
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.ai.ba6.Ba6Ai
        aps-environment: development
    dependencies:
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwift
        product: MLXOptimizers
      - package: MLXSwift
        product: MLXRandom
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXVLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
      - sdk: CoreData.framework
      - sdk: CoreML.framework
      - sdk: NaturalLanguage.framework
      - sdk: AppIntents.framework
      - sdk: UserNotifications.framework
      - sdk: CloudKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ba6.Ba6Ai
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_ASSET_PATHS: ""
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MEMORY_LIMIT_MB: 6000
