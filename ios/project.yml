name: Ba6Ai
options:
  bundleIdPrefix: ai.ba6
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES

packages:
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.21.0"
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.21.0"

# project.yml lives in ios/, but the .xcodeproj is generated at the
# repository root by ci_post_clone.sh (so Xcode Cloud's workflow can
# point at Ba6Ai.xcodeproj directly). That means PROJECT_DIR is the
# repo root at build time — every build setting that references a
# repo file must include the `ios/` prefix.
#
# XcodeGen's `info:` and `entitlements:` blocks write paths into the
# pbxproj verbatim; they don't get the prefix added. So we don't use
# those blocks here. Instead we commit the Info.plist and entitlements
# files, set INFOPLIST_FILE / CODE_SIGN_ENTITLEMENTS explicitly, and
# include them in the resources tree.

targets:
  Ba6Ai:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwift
        product: MLXOptimizers
      - package: MLXSwift
        product: MLXRandom
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXVLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
      - sdk: CoreData.framework
      - sdk: CoreML.framework
      - sdk: NaturalLanguage.framework
      - sdk: AppIntents.framework
      - sdk: UserNotifications.framework
      - sdk: CloudKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ba6.Ba6Ai
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_ASSET_PATHS: ""
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ios/Resources/Ba6Ai.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MEMORY_LIMIT_MB: 6000
